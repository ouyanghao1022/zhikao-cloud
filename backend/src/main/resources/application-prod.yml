server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

app:
  upload-dir: ${APP_UPLOAD_DIR:/app/uploads}

jwt:
  secret: ${JWT_SECRET}
  access-token-expire: 7200000
  refresh-token-expire: 604800000
  header: Authorization
  prefix: "Bearer "

logging:
  level:
    com.zhikao: info
    com.baomidou: warn