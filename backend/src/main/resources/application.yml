server:
  port: 8080
  servlet:
    context-path: /api/v1
    encoding:
      enabled: true
      charset: UTF-8
      force: true

spring:
  application:
    name: zhikao-cloud

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhikao_cloud?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 5000ms

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.zhikao.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    auto-mapping-behavior: full
  global-config:
    db-config:
      id-type: auto

# JWT配置
jwt:
  secret: zhikao-cloud-secret-key-2024-do-not-use-in-production
  access-token-expire: 7200000
  refresh-token-expire: 604800000
  header: Authorization
  prefix: "Bearer "

# MinIO配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: zhikao-cloud

# 应用配置
app:
  upload-dir: D:/Claude-Code-workplace/zhikao-cloud/uploads

# Knife4j配置
knife4j:
  enable: true
  openapi:
    title: 智考云 - 在线考试与学习平台 API文档
    description: 智考云系统接口文档
    version: 1.0.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.zhikao.controller

# 日志配置
logging:
  level:
    com.zhikao: debug
    com.baomidou: debug
  file:
    name: logs/zhikao-cloud.log
