services:
  mysql:
    image: mysql:8.0
    container_name: zhikao-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
      # 只挂 schema.sql,其它 ALTER/seed 脚本按需手工执行(见 deploy/SQL.md)
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:3306:3306"  # 仅本机访问,不暴露公网
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: zhikao/backend:1.0.0
    container_name: zhikao-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # 文件落盘到容器内,持久化到 uploads 卷
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - backend-uploads:/app/uploads
    # 端口不直暴露,由 frontend 通过内部网络访问
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: zhikao/frontend:1.0.0
    container_name: zhikao-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"  # 唯一对外的 HTTP 端口(Cloudflare Tunnel 会连它)
    volumes:
      - frontend-logs:/var/log/nginx

volumes:
  mysql-data:
  backend-uploads:
  frontend-logs: